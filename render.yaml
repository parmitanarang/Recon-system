# Render Blueprint — Node API + static frontend, Postgres
# https://render.com/docs/blueprint-spec

databases:
  - name: reconciliation-db
    plan: free

services:
  - type: web
    name: reconciliation-system
    runtime: node
    buildCommand: npm install && npm run build && cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: reconciliation-db
          property: connectionString
